<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Chattie</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
  </head>
  <body>
    <h1>Chattie</h1>
    <p id="users">Users: 1</p>
    <p id="session">Session ID Loading...</p>
    <div class="actions">
      <button onclick="join(prompt('Chat ID:'))">Join A Chatroom</button>
      <button
        onclick="createRoom(prompt('Chat ID (Leave blank to generate):'))"
      >
        Create A Chatroom
      </button>
    </div>
    <div id="chat"></div>
    <input id="name" placeholder="Username..." />
    <textarea id="msg" placeholder="Message..."></textarea>
    <button onclick="send()" id="sendmsg">Send</button>
    <div id="footer">
      <p>
        Styling generated by Gemini. Everything else is human made. Powered by
        PeerJS
      </p>
    </div>
    <div id="AdminPanel">
      <h2>Admin Controls</h2>
      <textarea id="alert" placeholder="Alert..."></textarea>
      <button onclick="sendAlert()" id="sendalrt">Send</button>
      <textarea id="info" placeholder="Info..."></textarea>
      <button onclick="sendInfo()" id="sendinfo">Send</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
